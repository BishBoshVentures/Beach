name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter '*' lint

      - name: Type check
        run: |
          pnpm --filter @beach-events/app exec tsc --noEmit
          pnpm --filter @beach-events/marketing exec tsc --noEmit

      - name: Build app
        run: pnpm build:app

      - name: Build marketing
        run: pnpm build:marketing
